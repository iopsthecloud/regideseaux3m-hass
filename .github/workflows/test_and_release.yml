name: Test and Release

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: "Create a release"
        required: false
        default: "false"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run linting
        run: |
          uv pip install ruff
          uv run ruff check custom_components/regiedeseauxmpl/

      - name: Run tests (without credentials)
        run: |
          uv run pytest tests/ -v --tb=short -k "not test_authentication and not test_meter_index"
        env:
          REGIE_USERNAME: "test@example.com"
          REGIE_PASSWORD: "test_password"

  build:
    name: Build HACS ZIP
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build ZIP
        run: |
          uv venv
          uv pip install -r pyproject.toml
          python scripts/build_hacs_zip.py --version ${{ github.event.inputs.release == 'true' && 'auto' || 'dev' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: regiedeseauxmpl-zip
          path: dist/*.zip
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: regiedeseauxmpl-zip
          path: dist/

      - name: Get version
        id: version
        run: |
          import json
          with open("custom_components/regiedeseauxmpl/manifest.json") as f:
              manifest = json.load(f)
          version = manifest["version"]
          print(f"VERSION={version}")
          echo "VERSION=${version}" >> $GITHUB_OUTPUT
        shell: python

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            **Nouvelle version de Régie des Eaux Montpellier**
            
            ### Changements
            - Voir [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) pour les détails
            
            ### Installation
            1. Téléchargez le fichier ZIP ci-dessous
            2. Dans HACS: Paramètres → Dépôts personnalisés → Ajouter ce dépôt
            3. Ou copiez manuellement dans `custom_components/`
          files: |
            dist/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
