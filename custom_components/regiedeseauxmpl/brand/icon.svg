<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Icône eau avec fond circulaire bleu -->
  <defs>
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond circulaire -->
  <circle cx="256" cy="256" r="240" fill="url(#waterGradient)"/>
  
  <!-- Forme d'onde d'eau -->
  <path fill="white" d="M256,100 C150,150 100,250 100,300 C100,350 150,400 256,400 C362,400 412,350 412,300 C412,250 362,150 256,100 Z"/>
  
  <!-- Ligne d'onde -->
  <path fill="none" stroke="white" stroke-width="8" stroke-linecap="round" 
        d="M100,300 C150,250 200,350 256,300 C312,250 362,350 412,300"/>
  
  <!-- Texte RdE (optionnel) -->
  <text x="256" y="350" font-family="Arial, sans-serif" font-size="48" 
        fill="white" text-anchor="middle" font-weight="bold">RdE</text>
  
  <!-- Bordure (optionnelle) -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1565C0" stroke-width="4"/>
</svg>
